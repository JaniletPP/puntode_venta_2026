# Blueprint: API (backend/) + estático Vite (dist/).
# Al crear el Blueprint, Render pedirá CORS_ORIGIN, VITE_API_ORIGIN y DB_*.
# URLs típicas (ajusta si Render muestra otra en el panel):
#   API:  https://punto-venta-api.onrender.com
#   Web: https://punto-venta-web.onrender.com
# CORS_ORIGIN debe incluir la URL del sitio estático, ej:
#   https://punto-venta-web.onrender.com,http://localhost:5173
# VITE_API_ORIGIN es solo el origen del API (sin /api), ej:
#   https://punto-venta-api.onrender.com
services:
  - type: web
    name: punto-venta-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "3306"

  - type: web
    name: punto-venta-web
    runtime: static
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_ORIGIN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
